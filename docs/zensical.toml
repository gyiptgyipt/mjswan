[project]
site_name = "mjswan"
site_description = "Documentation for the mjswan project."
site_url = "https://mjswan.readthedocs.io/"
repo_name = "ttktjmt/mjswan"
repo_url = "https://github.com/ttktjmt/mjswan"
copyright = "&copy;2026 mjswan Contributors"

nav = [
  { "Home" = "index.md" },
  { "Getting Started" = [
    { "Installation" = "getting-started/installation.md" },
    { "Quickstart" = "getting-started/quickstart.md" },
    { "Core Concepts" = "getting-started/core-concepts.md" },
    { "Examples" = "getting-started/examples.md" },
    { "Using mjlab" = "getting-started/mjlab.md" },
  ]},
  { "Guides" = [
    { "Deployment" = "guides/deployment.md" },
  ]},
  { "API Reference" = [
    { "Core API" = "api/core.md" },
  ]},
  { "Notes" = [
    { "Embeddings" = "notes/embeddings.md" },
    { "Policy Config" = "notes/policy-config.md" },
    { "Resources" = "notes/resources.md" },
  ]},
]

# ----------------------------------------------------------------------------
# Theme
# ----------------------------------------------------------------------------
[project.theme]
language = "en"
features = [
  "search.highlight",
  "content.tabs.link",
  "content.tooltips",
  "content.code.annotate",
  "content.code.copy",
  "content.code.select",
  "navigation.indexes",
  "navigation.sections",
  "navigation.expand",
  "navigation.path",
  "navigation.top",
  "navigation.footer",
]

[project.theme.icon]
logo = "simple/readthedocs"

[project.theme.font]
text = "Roboto"
code = "Roboto Mono"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "black"
accent = "cyan"
toggle.icon = "material/lightbulb-outline"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "blue grey"
accent = "cyan"
toggle.icon = "material/lightbulb"
toggle.name = "Switch to dark mode"

# ----------------------------------------------------------------------------
# Markdown Extensions
# ----------------------------------------------------------------------------
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.md_in_html]

[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.superfences]
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.snippets]
[project.markdown_extensions.pymdownx.blocks.caption]

[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji"
emoji_generator = "zensical.extensions.emoji.to_svg"

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.toc]
permalink = true
