name: test

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install uv
          uv pip install --system -e ".[dev]"

      # Runs L1/L2 tests only.
      # @slow tests (builder.build) trigger a full npm/Node.js frontend build
      # and are not suitable for regular CI.
      # Integration tests (L4) are skipped automatically when demo assets are absent.
      - name: Test with pytest
        run: |
          pytest -m "not slow" --tb=short -q
